name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
    env:
      MPLBACKEND: Agg
      PYTHONFAULTHANDLER: "1"
      UV_DEFAULT_INDEX: https://pypi.org/simple

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync locked public environment
        run: uv sync --locked --extra public --default-index https://pypi.org/simple

      - name: Lint with ruff
        run: uv run --no-sync ruff check src tests

      - name: Run unit and subprocess tests
        run: >-
          uv run --no-sync python -W error::FutureWarning
          -m unittest discover -s tests -v

      - name: Stress single Sina decoder
        run: >-
          uv run --no-sync python tests/stress_sina_decoder.py
          --workers 6 --tasks 600 --repeats 3
