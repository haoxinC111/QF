schema_version: 2

data:
  provider: tushare
  cache_dir: data/cache
  token_env: TUSHARE_TOKEN
  universe_index: 399300.SZ
  # 价格指数只用于 200 日均线风险开关；不要和业绩比较基准混用。
  regime_index: 000300.SH
  # 全收益指数只用于净值比较与超额收益计算。
  benchmark_index: H00300.CSI
  benchmark_is_total_return: true
  calls_per_minute: 180
  retries: 5
  refresh: false
  warmup_calendar_days: 500
  strict_validation: true
  industry_standard: SW2021
  industry_level: L1

# V2.0 第一阶段的独立时点数据侧车。默认关闭，因此不会改变 v1.6 回测。
# 启用前需先准备并校验上方 data.cache_dir 的基础行情缓存。
point_in_time:
  enabled: false
  provider: tushare
  cache_dir: data/pit_cache
  # 为回测开始日前补足财报历史，便于后续计算增长率与质量因子。
  history_years: 6
  # 财报公告至少到下一交易日才可见；日终估值在当日收盘后可见。
  fundamental_lag_trading_days: 1
  valuation_lag_trading_days: 0
  maximum_fundamental_age_days: 550
  maximum_valuation_age_days: 10
  minimum_symbol_coverage: 0.90
  refresh: false

backtest:
  start_date: 2018-01-01
  end_date: 2025-12-31
  initial_cash: 1000000
  annual_risk_free_rate: 0.0
  annual_cash_rate: 0.0
  maximum_stale_trading_days: 20
  stale_price_policy: warn
  delist_value_policy: zero
  output_dir: results/latest

strategy:
  # v1.5.1 治理热修复：生产默认恢复为 legacy_v1_4。
  # 如需复核冻结实验候选，仅改为 quality_momentum_v1_5；结果会标记 experimental/rejected。
  # 自定义权重时改为 custom，并显式填写下方八个 *_weight 字段。
  alpha_profile: legacy_v1_4
  top_n: 20
  min_history_days: 252
  min_avg_amount_million: 100
  min_price: 3
  winsor_quantile: 0.05
  stock_trend_filter: true
  # alpha_profile: custom 时可启用以下示例（这里列的是 legacy_v1_4 权重）：
  # momentum_12_1_weight: 0.35
  # momentum_6_1_weight: 0.20
  # fip_momentum_weight: 0.00
  # trend_weight: 0.15
  # low_volatility_weight: 0.20
  # low_downside_volatility_weight: 0.00
  # drawdown_quality_weight: 0.00
  # liquidity_weight: 0.10
  volatility_lookback: 60
  benchmark_ma_days: 200
  risk_on_exposure: 0.95
  risk_off_exposure: 0.30
  max_stock_weight: 0.08
  risk_weight_power: 1.0
  selection_buffer_enabled: true
  exit_rank: 35
  require_industry: true
  industry_neutralization_enabled: true
  max_industry_weight: 0.25
  require_size_data: true
  size_neutralization_enabled: true
  size_neutralization_strength: 1.0

portfolio:
  # 生产基线保持 inverse_vol_v1_4。复核 v1.6 时显式改为
  # shrinkage_min_variance_v1_6；报告会标记 experimental/pending_validation。
  construction_model: inverse_vol_v1_4
  covariance_lookback_days: 120
  minimum_covariance_observations: 60
  covariance_shrinkage: 0.50
  minimum_variance_blend: 0.50
  # 0 表示完全跟随新风险目标，0.5 表示把当前持仓作为一半偏好后重施硬上限。
  turnover_smoothing: 0.50
  covariance_ridge: 0.000001

execution:
  lot_size: 100
  commission_rate: 0.00025
  minimum_commission: 5
  fee_schedule:
    - start_date: 1900-01-01
      end_date: 2022-04-28
      stamp_duty_sell: 0.001
      transfer_fee_rate: 0.00002
    - start_date: 2022-04-29
      end_date: 2023-08-27
      stamp_duty_sell: 0.001
      transfer_fee_rate: 0.00001
    - start_date: 2023-08-28
      end_date:
      stamp_duty_sell: 0.0005
      transfer_fee_rate: 0.00001
  slippage_bps: 5
  # 生产基线保持 fixed_bps；v1.6 研究臂使用 square_root_v1_6。
  market_impact_model: fixed_bps
  market_impact_coefficient: 0.50
  market_impact_volatility_floor: 0.10
  max_market_impact_bps: 50
  cash_buffer: 0.02
  max_participation_of_20d_amount: 0.05
  rebalance_retry_days: 3
  sizing_price: signal_close
  reject_st_on_execution: true
